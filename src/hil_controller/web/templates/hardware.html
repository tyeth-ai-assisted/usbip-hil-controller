{% extends "base.html" %}
{% block content %}
<h1>Hardware (Aux Devices)</h1>

<div id="form-panel"></div>

<div class="tbl-wrap">
  <div class="tbl-header">
    <h2>Attached Hardware <span class="tbl-count">{{ hardware|length }}</span></h2>
    <button class="btn btn-primary"
      hx-get="/ui/hardware/form"
      hx-target="#form-panel"
      hx-swap="innerHTML">+ Add Hardware</button>
  </div>
  <table>
    <thead><tr>
      <th>ID</th><th>Kind</th><th>Model</th><th>Interface</th><th>Observability</th>
      <th>Capabilities</th><th>Pool</th><th>Connected Devices</th><th>Status</th><th></th>
    </tr></thead>
    <tbody id="hardware-body">
      {% include "hardware_body.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
